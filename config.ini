//This is the configuration for the REST interface
[restif]
rest_ip = 127.0.0.1
rest_port = 8080
rest_secret = superSecret

//This is a configuration for server worker 1 - outputs to UDP
[config1]
listen_port=8000
listen_ip=0.0.0.0
out_port=8100
out_ip=127.0.0.1
key=th15i$4k3y
reorder_distance=4
//The tag key is optional and puts the config into MPSRTTS mode
tag = 8
//output_type can be: udp (default), fifo, or both
output_type=udp

//This is a configuration for server worker 2 - outputs to single FIFO
[config2]
listen_port=8001
listen_ip=0.0.0.0
key=th15i$4k3y
reorder_distance=4
output_type=fifo
fifo_paths=/tmp/ts_stream.fifo

//This is a configuration for server worker 3 - outputs to multiple FIFOs (encoding and monitoring)
[config3]
listen_port=8002
listen_ip=0.0.0.0
key=th15i$4k3y
reorder_distance=4
output_type=fifo
fifo_paths=/tmp/ts_encode.fifo, /tmp/ts_monitor.fifo

//This is a configuration for server worker 4 - outputs to both UDP and multiple FIFOs
[config4]
listen_port=8003
listen_ip=0.0.0.0
out_port=8104
out_ip=127.0.0.1
key=th15i$4k3y
reorder_distance=4
output_type=both
fifo_paths=/tmp/ts_dual1.fifo, /tmp/ts_dual2.fifo

//a MPSRTTS configuration can be attached a flow. The flow must be entered after the configuration block in this file
[flow1]
bind_to=config1
out_port=8102
out_ip=127.0.0.1
tag = 11
output_type=udp

[flow2]
bind_to=config1
out_port=8103
out_ip=127.0.0.1
tag = 14
output_type=udp

//Flow with single FIFO output
[flow3]
bind_to=config1
tag = 12
output_type=fifo
fifo_paths=/tmp/ts_flow.fifo

//Flow with multiple FIFO outputs
[flow4]
bind_to=config1
tag = 15
output_type=fifo
fifo_paths=/tmp/ts_flow_primary.fifo, /tmp/ts_flow_backup.fifo
